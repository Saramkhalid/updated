<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak Dr Areed 🌙✨</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
        color: white;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .card {
        text-align: center;
        background: rgba(255,255,255,0.08);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 45px;
        margin-bottom: 10px;
    }

    h2 {
        margin-bottom: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #ffcc00;
        color: black;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ffd633;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
        from {opacity: 0.3;}
        to {opacity: 1;}
    }
</style>
</head>

<body>

<div class="card">
    <h1>🌙 Eid Mubarak ✨</h1>
    <h2>Dr Areed 💫</h2>

    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <p style="margin-top:25px;">— From Saram</p>
</div>

<script>
    function showSurprise() {
        alert("Lucky disaster is missing u 💔✨");
    }

    // Stars
    for (let i = 0; i < 80; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * window.innerHeight + "px";
        star.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(star);
    }
</script>

</body>
</html>
